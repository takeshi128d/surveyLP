<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Survey | アンケート調査</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        .option-card.selected { border-color: #2563eb; background-color: #eff6ff; ring: 2px; ring-color: #2563eb; }
        .loading-spinner { border-top-color: transparent; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased min-h-screen">

    <header class="sticky top-0 z-10 bg-white/80 backdrop-blur-md border-b border-slate-200">
        <div class="max-w-xl mx-auto px-6 py-4">
            <div class="flex justify-between items-center mb-2">
                <span class="text-sm font-bold text-blue-600 tracking-tight">BRAND LIFT SURVEY</span>
                <span id="progress-text" class="text-xs font-medium text-slate-400">Step 1 / 3</span>
            </div>
            <div class="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden">
                <div id="progress-bar" class="bg-blue-600 h-full transition-all duration-500 ease-in-out" style="width: 33.3%"></div>
            </div>
        </div>
    </header>

    <main class="max-w-xl mx-auto px-6 py-10">
        <form id="survey-form" class="space-y-8">
            <input type="hidden" id="user_id" name="user_id">
            <input type="hidden" id="campaign_id" name="campaign_id">

            <section id="step-1" class="animate-fade-in space-y-6">
                <div class="space-y-2">
                    <h2 class="text-2xl font-extrabold tracking-tight">Q1. 認知経路について</h2>
                    <p class="text-slate-500 text-sm">この製品をどこで初めて知りましたか？</p>
                </div>
                <div class="grid gap-3">
                    <label class="option-card group p-5 border-2 border-slate-200 rounded-2xl cursor-pointer flex items-center transition-all hover:border-blue-300">
                        <input type="radio" name="q1" value="SNS" class="hidden" required>
                        <div class="w-10 h-10 bg-blue-50 rounded-full flex items-center justify-center mr-4 group-hover:bg-blue-100 transition-colors">
                            <i class="fa-solid fa-hashtag text-blue-600"></i>
                        </div>
                        <span class="font-bold text-slate-700">SNS (Instagram / X)</span>
                    </label>
                    <label class="option-card group p-5 border-2 border-slate-200 rounded-2xl cursor-pointer flex items-center transition-all hover:border-blue-300">
                        <input type="radio" name="q1" value="WebAd" class="hidden">
                        <div class="w-10 h-10 bg-indigo-50 rounded-full flex items-center justify-center mr-4 group-hover:bg-indigo-100 transition-colors">
                            <i class="fa-solid fa-rectangle-ad text-indigo-600"></i>
                        </div>
                        <span class="font-bold text-slate-700">Web広告</span>
                    </label>
                    <label class="option-card group p-5 border-2 border-slate-200 rounded-2xl cursor-pointer flex items-center transition-all hover:border-blue-300">
                        <input type="radio" name="q1" value="Other" class="hidden">
                        <div class="w-10 h-10 bg-slate-50 rounded-full flex items-center justify-center mr-4 group-hover:bg-slate-100 transition-colors">
                            <i class="fa-solid fa-ellipsis text-slate-600"></i>
                        </div>
                        <span class="font-bold text-slate-700">その他</span>
                    </label>
                </div>
                <button type="button" onclick="nextStep(2)" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold text-lg hover:bg-slate-800 transition-all shadow-xl shadow-slate-200">
                    次へ進む <i class="fa-solid fa-chevron-right ml-2 text-sm"></i>
                </button>
            </section>

            <section id="step-2" class="hidden animate-fade-in space-y-6">
                <div class="space-y-2">
                    <h2 class="text-2xl font-extrabold tracking-tight">Q2. 購入意向について</h2>
                    <p class="text-slate-500 text-sm">今後、この製品を購入したいと思いますか？</p>
                </div>
                <div class="grid gap-3">
                    <label class="option-card p-5 border-2 border-slate-200 rounded-2xl cursor-pointer flex items-center transition-all">
                        <input type="radio" name="q2" value="VeryLikely" class="hidden" required>
                        <span class="font-bold text-slate-700">非常に購入したい</span>
                    </label>
                    <label class="option-card p-5 border-2 border-slate-200 rounded-2xl cursor-pointer flex items-center transition-all">
                        <input type="radio" name="q2" value="Likely" class="hidden">
                        <span class="font-bold text-slate-700">やや購入したい</span>
                    </label>
                    <label class="option-card p-5 border-2 border-slate-200 rounded-2xl cursor-pointer flex items-center transition-all">
                        <input type="radio" name="q2" value="Neutral" class="hidden">
                        <span class="font-bold text-slate-700">どちらともいえない</span>
                    </label>
                </div>
                <div class="flex gap-4">
                    <button type="button" onclick="nextStep(1)" class="w-1/3 border border-slate-300 py-4 rounded-2xl font-bold text-slate-500 hover:bg-slate-50 transition">戻る</button>
                    <button type="button" onclick="nextStep(3)" class="w-2/3 bg-slate-900 text-white py-4 rounded-2xl font-bold text-lg hover:bg-slate-800 transition shadow-xl shadow-slate-200">最後へ</button>
                </div>
            </section>

            <section id="step-3" class="hidden animate-fade-in space-y-6">
                <div class="space-y-2">
                    <h2 class="text-2xl font-extrabold tracking-tight">Q3. 自由記述</h2>
                    <p class="text-slate-500 text-sm">製品への期待やご意見を自由にお書きください。</p>
                </div>
                <textarea name="q3" rows="5" class="w-full border-2 border-slate-200 rounded-2xl p-5 focus:border-blue-500 focus:ring-4 focus:ring-blue-50 text-slate-700 outline-none transition" placeholder="入力してください（任意）"></textarea>
                <div class="flex gap-4">
                    <button type="button" onclick="nextStep(2)" class="w-1/3 border border-slate-300 py-4 rounded-2xl font-bold text-slate-500 hover:bg-slate-50 transition">戻る</button>
                    <button type="submit" id="submit-btn" class="w-2/3 bg-green-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-green-700 transition shadow-xl shadow-green-100 flex justify-center items-center">
                        <span id="btn-text">回答を送信する</span>
                        <div id="spinner" class="hidden animate-spin h-5 w-5 border-2 border-white rounded-full loading-spinner ml-3"></div>
                    </button>
                </div>
            </section>
        </form>

        <div id="thank-you" class="hidden py-16 text-center animate-fade-in space-y-6">
            <div class="w-24 h-24 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto text-4xl shadow-inner">
                <i class="fa-solid fa-check"></i>
            </div>
            <div class="space-y-2">
                <h2 class="text-3xl font-black">THANK YOU!</h2>
                <p class="text-slate-500 font-medium leading-relaxed">アンケートへのご協力ありがとうございました。<br>回答は正常に送信されました。</p>
            </div>
            <p class="text-xs text-slate-400">この画面は閉じていただいて構いません。</p>
        </div>
    </main>

    <script>
        // ---------------------------------------------------------
        // 1. 設定：ご提示いただいたGASのURL
        // ---------------------------------------------------------
        const GAS_URL = "https://script.google.com/a/macros/dearone.io/s/AKfycbxjP5RprZufw5mXngO7bErY7xOKW9XiUDhOLelxy19eT7q5pxhlI3zopEQIdDUft9XlNg/exec";

        // ---------------------------------------------------------
        // 2. 初期化：URLパラメータの自動取得
        // ---------------------------------------------------------
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            // user_id, camp_id というパラメータを拾う
            document.getElementById('user_id').value = params.get('user_id') || 'untracked';
            document.getElementById('campaign_id').value = params.get('camp_id') || 'untracked';
            console.log("Tracking initialized:", {
                uid: document.getElementById('user_id').value,
                cid: document.getElementById('campaign_id').value
            });
        };

        // ---------------------------------------------------------
        // 3. UIロジック：ステップ切り替え
        // ---------------------------------------------------------
        function nextStep(step) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(`step-${step}`).classList.remove('hidden');
            
            // 進捗バー更新
            const progress = (step / 3) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;
            document.getElementById('progress-text').innerText = `Step ${step} / 3`;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ラジオボタン選択時の視覚効果
        document.querySelectorAll('input[type="radio"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                document.querySelectorAll(`input[name="${e.target.name}"]`).forEach(r => {
                    r.parentElement.classList.remove('selected');
                });
                if(e.target.checked) e.target.parentElement.classList.add('selected');
            });
        });

        // ---------------------------------------------------------
        // 4. データ送信：GAS連携
        // ---------------------------------------------------------
        document.getElementById('survey-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const spinner = document.getElementById('spinner');
            const btnText = document.getElementById('btn-text');

            // 送信中状態に
            btn.disabled = true;
            spinner.classList.remove('hidden');
            btnText.innerText = "送信中...";

            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());

            try {
                // GASへの送信
                await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors', // CORS制約を回避するための設定
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                // 成功表示
                document.getElementById('survey-form').classList.add('hidden');
                document.querySelector('header').classList.add('hidden');
                document.getElementById('thank-you').classList.remove('hidden');
            } catch (error) {
                console.error("Error!", error);
                alert("送信中にエラーが発生しました。通信環境をご確認ください。");
                btn.disabled = false;
                spinner.classList.add('hidden');
                btnText.innerText = "回答を送信する";
            }
        };
    </script>
</body>
</html>
